<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>SMAI Sentinel Command</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.26.0/cytoscape.min.js"></script>
  <script src="https://unpkg.com/lucide@0.344.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Rubik:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --g: #00d4aa; --b: #38bdf8; --r: #fb7185; --y: #fbbf24; --p: #a78bfa;
      --bg: #0d1117; --card: #161b22; --border: #30363d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: #c9d1d9;
      font-family: 'Rubik', sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column;
    }
    .mono { font-family: 'JetBrains Mono', monospace; }
    .glass { background: rgba(22, 27, 34, 0.8); backdrop-filter: blur(12px); border: 1px solid var(--border); }
    .btn-g { background: var(--g); color: #000; font-weight: 600; transition: all 0.2s; }
    .btn-g:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0, 212, 170, 0.3); }
    input, select, textarea {
      background: #0d1117; border: 1px solid var(--border); border-radius: 6px;
      padding: 0.5rem 0.75rem; color: white; outline: none;
    }
    input:focus { border-color: var(--g); box-shadow: 0 0 0 1px var(--g); }
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
      display: none; align-items: center; justify-content: center; z-index: 100;
    }
    .modal-overlay.open { display: flex; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
  </style>
</head>
<body>

<div id="view-login" class="fixed inset-0 z-[200] bg-[#0d1117] flex items-center justify-center p-4">
  <div class="w-full max-w-md space-y-8 animate-in fade-in zoom-in duration-500">
    <div class="text-center">
      <div class="inline-flex p-4 rounded-2xl bg-teal-500/10 border border-teal-500/20 mb-4">
        <i data-lucide="shield" class="w-12 h-12 text-[#00d4aa]"></i>
      </div>
      <h1 class="text-3xl font-bold tracking-tight text-white mb-2">SMAI Sentinel</h1>
      <p class="text-gray-400">Command Center v2.1</p>
    </div>
    <div class="glass p-8 rounded-2xl space-y-6">
      <div id="login-err" class="hidden p-3 rounded-lg bg-rose-500/10 border border-rose-500/20 text-rose-400 text-sm text-center"></div>
      <div class="space-y-4">
        <div class="space-y-2">
          <label class="text-sm font-medium text-gray-300">אימייל</label>
          <input type="email" id="login-email" class="w-full" placeholder="name@example.com"/>
        </div>
        <div class="space-y-2">
          <label class="text-sm font-medium text-gray-300">סיסמה</label>
          <input type="password" id="login-pass" class="w-full" placeholder="••••••••"/>
        </div>
      </div>
      <button onclick="doLogin()" class="w-full btn-g py-3 rounded-xl flex items-center justify-center gap-2">
        <span>התחברות למערכת</span>
        <i data-lucide="arrow-left" class="w-4 h-4"></i>
      </button>
    </div>
  </div>
</div>

<div id="view-app" class="hidden flex-1 flex flex-col h-full">
  <header class="h-16 glass border-t-0 border-x-0 flex items-center justify-between px-6 z-50">
    <div class="flex items-center gap-4">
      <div class="flex items-center gap-2">
        <i data-lucide="terminal" class="w-5 h-5 text-[#00d4aa]"></i>
        <span class="font-bold text-white tracking-wider">SENTINEL</span>
      </div>
      <div class="h-4 w-[1px] bg-gray-800"></div>
      <div id="user-badge" class="flex items-center gap-2 text-sm bg-gray-800/50 px-3 py-1 rounded-full border border-gray-700">
        </div>
    </div>
    <button onclick="logout()" class="p-2 hover:bg-rose-500/10 hover:text-rose-400 rounded-lg transition-colors">
      <i data-lucide="log-out" class="w-5 h-5"></i>
    </button>
  </header>

  <div class="flex-1 flex overflow-hidden">
    <aside class="w-64 glass border-y-0 border-r-0 p-4 space-y-2 hidden lg:block">
      <button onclick="setTab('dashboard')" class="tab-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:text-white transition-all">
        <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
        <span class="font-medium">לוח בקרה</span>
      </button>
      <button onclick="setTab('cases')" class="tab-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:text-white transition-all">
        <i data-lucide="folder-search" class="w-5 h-5"></i>
        <span class="font-medium">תיקי חקירה</span>
      </button>
      <button onclick="setTab('nexus')" class="tab-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:text-white transition-all">
        <i data-lucide="share-2" class="w-5 h-5"></i>
        <span class="font-medium">Nexus Graph</span>
      </button>
    </aside>

    <main id="main-scroll" class="flex-1 overflow-y-auto p-6 space-y-6">
       <div id="tab-content" class="max-w-7xl mx-auto"></div>
    </main>
  </div>
</div>

<script>
  // ── LOGIC & API ─────────────────────────────────────────────────────────────
  let S = { user: null, token: null, tab: 'dashboard' };

  /* התיקון הקריטי: כתובות יחסיות בשביל Render */
  async function api(url, opt = {}) {
    const token = localStorage.getItem('smai_token');
    opt.headers = { ...opt.headers, 'Content-Type': 'application/json' };
    if (token) opt.headers['Authorization'] = `Bearer ${token}`;

    const res = await fetch(url, opt);
    if (res.status === 401) { logout(); throw 'Unauthorized'; }
    if (!res.ok) { const e = await res.json(); throw e.detail || 'Error'; }
    return res.json();
  }

  async function doLogin() {
    const email = document.getElementById('login-email').value;
    const password = document.getElementById('login-pass').value;
    const err = document.getElementById('login-err');
    
    try {
      const data = await api('/api/auth/login', {
        method: 'POST',
        body: JSON.stringify({ email, password })
      });
      localStorage.setItem('smai_token', data.token);
      localStorage.setItem('smai_user', JSON.stringify(data.user));
      location.reload();
    } catch (e) {
      err.innerText = e;
      err.classList.remove('hidden');
    }
  }

  function logout() {
    localStorage.clear();
    location.reload();
  }

  // אתחול דף
  window.onload = () => {
    const savedUser = localStorage.getItem('smai_user');
    if (savedUser) {
      S.user = JSON.parse(savedUser);
      document.getElementById('view-login').classList.add('hidden');
      document.getElementById('view-app').classList.remove('hidden');
      document.getElementById('user-badge').innerHTML = `
        <span class="text-white font-medium">${S.user.display_name}</span>
        ${S.user.verified ? '<i data-lucide="badge-check" class="w-4 h-4 text-sky-400 fill-sky-400/20"></i>' : ''}
      `;
      lucide.createIcons();
      // כאן תטען את שאר הפונקציות של התיקים והגרפים שלך
    }
    lucide.createIcons();
  };
</script>
</body>
</html>
