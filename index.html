<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>SMAI Sentinel | Command Center v2.1</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.26.0/cytoscape.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&family=Rubik:wght@300;400;500;700&display=swap" rel="stylesheet"/>

  <style>
    :root { --g: #00d4aa; --bg: #0d1117; --card: #161b22; --border: #30363d; }
    body { background: var(--bg); color: #c9d1d9; font-family: 'Rubik', sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
    .glass { background: rgba(22, 27, 34, 0.8); backdrop-filter: blur(12px); border: 1px solid var(--border); }
    .nav-btn { width: 100%; display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 12px; transition: all 0.2s; color: #8b949e; cursor: pointer; }
    .nav-btn:hover { background: rgba(0, 212, 170, 0.1); color: var(--g); }
    .nav-btn.active { background: var(--g); color: #000; font-weight: 700; }
    .pane { display: none; height: 100%; overflow-y: auto; }
    .pane.active { display: block; }
    #nexus-canvas { width: 100%; height: 600px; background: #05070a; border-radius: 16px; border: 1px solid var(--border); }
    .mono { font-family: 'JetBrains Mono', monospace; }
  </style>
</head>
<body>

<div id="view-login" class="fixed inset-0 z-[200] bg-[#0d1117] flex items-center justify-center p-4">
  <div class="w-full max-w-md glass p-10 rounded-3xl space-y-8 text-center animate-in fade-in duration-700">
    <i data-lucide="shield-check" class="w-16 h-16 text-[#00d4aa] mx-auto"></i>
    <h1 class="text-3xl font-bold text-white tracking-tighter">SMAI SENTINEL</h1>
    <div class="space-y-4">
      <input type="email" id="login-email" class="w-full bg-black border border-gray-700 p-4 rounded-xl" placeholder="Email"/>
      <input type="password" id="login-pass" class="w-full bg-black border border-gray-700 p-4 rounded-xl" placeholder="Password"/>
      <button onclick="doLogin()" class="w-full bg-[#00d4aa] text-black py-4 rounded-xl font-bold text-lg hover:shadow-[0_0_20px_rgba(0,212,170,0.4)] transition-all">התחברות מאובטחת</button>
    </div>
  </div>
</div>

<div id="view-app" class="hidden flex-1 flex flex-col h-full overflow-hidden">
  <header class="h-16 glass flex items-center justify-between px-8 z-50">
    <div class="flex items-center gap-4 text-white font-bold tracking-widest uppercase">
      <i data-lucide="activity" class="text-[#00d4aa]"></i> SENTINEL ✔️
    </div>
    <div id="user-info" class="flex items-center gap-4">
      <span id="user-name" class="text-sm font-medium"></span>
      <button onclick="logout()" class="text-rose-500 hover:bg-rose-500/10 p-2 rounded-lg"><i data-lucide="power"></i></button>
    </div>
  </header>

  <div class="flex-1 flex overflow-hidden">
    <aside class="w-72 glass p-5 space-y-2 overflow-y-auto hidden lg:block">
      <div onclick="setTab('dashboard')" class="nav-btn active" id="btn-dashboard"><i data-lucide="layout-grid"></i><span>לוח בקרה</span></div>
      <div onclick="setTab('cases')" class="nav-btn" id="btn-cases"><i data-lucide="briefcase"></i><span>תיקי חקירה</span></div>
      <div onclick="setTab('nexus')" class="nav-btn" id="btn-nexus"><i data-lucide="share-2"></i><span>גרף קשרים (Nexus)</span></div>
      <div onclick="setTab('osint')" class="nav-btn" id="btn-osint"><i data-lucide="radar"></i><span>כלי סריקה (Scanner)</span></div>
      <div class="h-[1px] bg-gray-800 my-4"></div>
      <div onclick="setTab('chat')" class="nav-btn" id="btn-chat"><i data-lucide="message-circle"></i><span>צ'אט מבצעי</span></div>
      <div onclick="setTab('users')" class="nav-btn" id="btn-users"><i data-lucide="shield-alert"></i><span>ניהול משתמשים</span></div>
    </aside>

    <main class="flex-1 p-8 overflow-hidden relative">
      
      <div id="pane-dashboard" class="pane active space-y-8">
        <h2 class="text-4xl font-bold text-white">System Overview</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6" id="stats-container">
           </div>
      </div>

      <div id="pane-cases" class="pane space-y-6">
        <div class="flex justify-between items-center">
          <h2 class="text-4xl font-bold text-white">תיקי חקירה</h2>
          <button onclick="openNewCase()" class="bg-[#00d4aa] text-black px-6 py-3 rounded-xl font-bold">+ פתח תיק חדש</button>
        </div>
        <div id="cases-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
      </div>

      <div id="pane-nexus" class="pane space-y-6">
        <h2 class="text-4xl font-bold text-white">The Nexus Graph</h2>
        <div id="nexus-canvas" class="shadow-2xl"></div>
      </div>

      <div id="pane-osint" class="pane space-y-6">
        <h2 class="text-4xl font-bold text-white">OSINT Intelligence</h2>
        <div class="glass p-8 rounded-3xl space-y-4">
          <label class="block text-gray-400">הזן מזהה משתמש (Roblox/Discord)</label>
          <div class="flex gap-4">
            <input id="scan-input" class="flex-1 bg-black border border-gray-700 p-4 rounded-xl" placeholder="User ID..."/>
            <button onclick="startScan()" class="bg-blue-500 text-white px-8 rounded-xl font-bold">סרוק</button>
          </div>
          <div id="scan-results" class="mt-8 grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>
      </div>

    </main>
  </div>
</div>

<script>
  let S = { user: null, cy: null };

  // פונקציית API חכמה לכל מכשיר
  async function api(path, opts={}) {
    const token = localStorage.getItem('smai_token');
    const res = await fetch(path, {
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
      ...opts
    });
    if (res.status === 401) logout();
    return res.json();
  }

  function setTab(tid) {
    document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(`pane-${tid}`).classList.add('active');
    document.getElementById(`btn-${tid}`).classList.add('active');
    
    if (tid === 'cases') loadCases();
    if (tid === 'nexus') initNexus();
    if (tid === 'dashboard') loadStats();
  }

  async function loadCases() {
    const grid = document.getElementById('cases-grid');
    grid.innerHTML = '<div class="text-teal-500 animate-pulse">מושך נתונים מהשרת...</div>';
    const cases = await api('/api/cases');
    grid.innerHTML = cases.map(c => `
      <div class="glass p-6 rounded-3xl border-r-8 border-teal-500 hover:scale-105 transition-all">
        <div class="flex justify-between items-start mb-4">
          <h3 class="text-xl font-bold text-white">${c.name}</h3>
          <span class="px-2 py-1 bg-teal-500/10 text-teal-400 text-xs rounded uppercase font-bold">${c.risk_level} Risk</span>
        </div>
        <p class="text-sm text-gray-400 line-clamp-2 mb-4">${c.notes || 'אין הערות נוספות לתיק זה'}</p>
        <div class="flex justify-between items-center">
          <span class="text-xs mono text-gray-500">${c.platform}</span>
          <button class="text-[#00d4aa] text-sm font-bold">צפה בתיק ></button>
        </div>
      </div>
    `).join('');
  }

  async function initNexus() {
    const data = await api('/api/nexus');
    S.cy = cytoscape({
      container: document.getElementById('nexus-canvas'),
      elements: data,
      style: [
        { selector: 'node', style: { 'background-color': '#00d4aa', 'label': 'data(label)', 'color': '#fff', 'font-size': '10px' } },
        { selector: 'edge', style: { 'width': 2, 'line-color': '#30363d', 'target-arrow-color': '#30363d', 'target-arrow-shape': 'triangle', 'curve-style': 'bezier', 'label': 'data(label)', 'font-size': '8px', 'color': '#8b949e' } }
      ],
      layout: { name: 'cose', animate: true }
    });
  }

  async function doLogin() {
    const email = document.getElementById('login-email').value;
    const password = document.getElementById('login-pass').value;
    const res = await api('/api/auth/login', { method: 'POST', body: JSON.stringify({ email, password }) });
    if (res.token) {
      localStorage.setItem('smai_token', res.token);
      localStorage.setItem('smai_user', JSON.stringify(res.user));
      location.reload();
    } else { alert("גישה נדחתה"); }
  }

  function logout() { localStorage.clear(); location.reload(); }

  window.onload = () => {
    const user = localStorage.getItem('smai_user');
    if (user) {
      S.user = JSON.parse(user);
      document.getElementById('view-login').style.display = 'none';
      document.getElementById('view-app').classList.remove('hidden');
      document.getElementById('user-name').innerText = S.user.display_name;
      setTab('dashboard');
    }
    lucide.createIcons();
  };
</script>
</body>
</html>
